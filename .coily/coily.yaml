# Per-repo command allowlist for session-lattice. The harness denies bare
# `uv:*` and `make:*` invocations; dev verbs route through coily so each
# call lands in the audit log.

commands:
  sync:
    run: make sync
    description: uv sync the workspace.
  watch:
    run: make watch
    description: Run the service from checkout on port 7781 (dev mcporter slot), pointed at repo-recall-dev on 7780. Separate DuckDB home at ~/.session-lattice-dev.
  lint:
    run: make lint
    description: Run ruff + mypy.
  fmt:
    run: make fmt
    description: Format with ruff.
  test:
    run: make test
    description: Run pytest. (No tests yet; placeholder until first view lands.)
  brew-resources:
    run: bash scripts/brew-resources.sh
    description: Print Homebrew resource blocks for the synced uv venv. Pipe between the BEGIN/END RESOURCES markers in Formula/session-lattice.rb.

# Catalog metadata for the cross-repo knowledge graph.
# Schema: coilysiren/agentic-os-kai#420 (tracker).
catalog:
  kind: Component
  type: service
  system: observability
  owner: kai
  lifecycle: experimental
  description: "Materialized-view service over Claude session data. Pulls from repo-recall, maintains views in embedded DuckDB, serves over HTTP to luca."
  dependsOn:
    - coilysiren/repo-recall
  providesApis:
    - session-lattice-views
