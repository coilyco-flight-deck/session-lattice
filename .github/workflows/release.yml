name: release

# Tag-only release on every push to main. Same shape as repo-recall's:
# tag the commit, cut a GH Release with auto-changelog, then dispatch
# bump-session-lattice in coilysiren/homebrew-tap so the formula is
# rewritten via the Contents API (web-flow signed, satisfies the
# signed-commits ruleset on homebrew-tap).
#
# All ${{ }} interpolations are repo-controlled (action outputs, job
# needs, secrets) - no github.event.* untrusted input flows into a run
# block. The gh api call uses env-var indirection per the safe pattern.
#
# Manual setup (one-time, requires Kai):
#   gh secret set HOMEBREW_TAP_TOKEN --repo coilysiren/session-lattice
#     value: a fine-grained PAT scoped to coilysiren/homebrew-tap with
#            `Repository permissions -> Contents: Read and write`

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-tap:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          revision=$(git rev-parse HEAD)
          url="ssh://git@github.com/coilysiren/session-lattice.git"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Dispatch bump to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          DISPATCH_TAG: ${{ needs.release.outputs.tag }}
          DISPATCH_URL: ${{ steps.rev.outputs.url }}
          DISPATCH_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          gh api -X POST repos/coilysiren/homebrew-tap/dispatches \
            -f event_type=bump-session-lattice \
            -f "client_payload[tag]=${DISPATCH_TAG}" \
            -f "client_payload[url]=${DISPATCH_URL}" \
            -f "client_payload[revision]=${DISPATCH_REVISION}"
