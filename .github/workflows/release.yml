name: release

# Tag-only release on every push to main. Conventional commits drive the
# semver bump. Tag is created at the pushed commit, GH Release is cut with
# the auto-generated changelog, then two formula-bump jobs rewrite the
# url+tag+revision line of both formulae via the Contents API.
#
# Brew now installs from the centralized flight-deck tap:
#   brew tap coilyco-flight-deck/tap https://forgejo.coilysiren.me/coilyco-flight-deck/homebrew-tap
#   brew install coilyco-flight-deck/tap/session-lattice
#
# bump-tap-formula writes that central tap (on forgejo). The per-repo
# bump-formula keeps the in-repo Formula/*.rb fresh for one migration cycle
# as a fallback for the old direct-repo tap:
#   brew tap coilyco-flight-deck/session-lattice https://forgejo.coilysiren.me/coilyco-flight-deck/session-lattice
#   brew install coilyco-flight-deck/session-lattice/session-lattice
# Drop bump-formula + the in-repo Formula/*.rb next release cycle.
#
# All ${{ }} interpolations are repo-controlled - no github.event.*
# untrusted input flows into a run block.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-formula:
    # Rewrite Formula/session-lattice.rb's url line to point at the just-cut
    # tag + revision. Brew reads the formula from the tap clone (latest main),
    # so the rewrite has to land back here. Commit message carries [skip ci]
    # so this push doesn't re-trigger the release workflow.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release.outputs.tag }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          revision=$(git rev-parse HEAD)
          echo "revision=$revision" >> "$GITHUB_OUTPUT"

      - name: Rewrite Formula urls via Contents API
        env:
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          new_line="  url \"https://forgejo.coilysiren.me/${REPO}.git\", tag: \"${TAG}\", revision: \"${NEW_REVISION}\""
          tmp=$(mktemp -d)
          # Bump both the main formula and the puller companion formula in the
          # same pass. Both pin the same tag + revision because the puller
          # formula depends on the binary shipped by the main formula. Each
          # gets its own Contents API PUT.
          for path in Formula/session-lattice.rb Formula/session-lattice-puller.rb; do
            fname=$(basename "$path")
            # Fetch the live main version (not the tag's snapshot - we want to
            # patch on top of the latest formula, including any non-version edits).
            curl -fsSL \
              "https://raw.githubusercontent.com/${REPO}/main/${path}" \
              > "$tmp/$fname"
            sed -i "s|^  url \".*|${new_line}|" "$tmp/$fname"
            cur_sha=$(gh api "repos/${REPO}/contents/${path}?ref=main" --jq .sha)
            new_b64=$(base64 -w0 < "$tmp/$fname")
            gh api -X PUT "repos/${REPO}/contents/${path}" \
              -f message="chore(formula): bump $fname to ${TAG} [skip ci]" \
              -f content="$new_b64" \
              -f sha="$cur_sha" \
              -f branch=main
          done

  bump-tap-formula:
    # Centralized monorepo tap: rewrite both Formula/session-lattice*.rb in
    # coilyco-flight-deck/homebrew-tap to pin the just-cut tag + revision.
    # Cross-host write (github Actions -> forgejo), so it uses FORGEJO_TOKEN
    # (the org-level forgejo PAT on coilyco-flight-deck that ward also uses
    # for the tap write) rather than the job's GITHUB_TOKEN. This is the
    # per-repo bump-formula above stays one migration cycle as a fallback
    # for the old direct-repo tap. All ${{ }} interpolations are
    # repo-controlled - no github.event.* untrusted input reaches a run block.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
      FORGEJO_BASE_URL: https://forgejo.coilysiren.me
      SRC_REPO: coilyco-flight-deck/session-lattice
      TAP_REPO: coilyco-flight-deck/homebrew-tap
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Rewrite both tap formulae via forgejo Contents API
        env:
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          # Both the main formula and its puller companion pin the same tag +
          # revision (puller depends on the binary the main formula ships).
          # url targets the source repo, written into the tap repo.
          new_line="  url \"$FORGEJO_BASE_URL/${SRC_REPO}.git\", tag: \"${TAG}\", revision: \"${NEW_REVISION}\""
          for fname in session-lattice.rb session-lattice-puller.rb; do
            path="Formula/$fname"
            # Patch on top of the tap's live main, preserving non-version edits.
            meta=$(curl -fsS -H "Authorization: token $FORGEJO_TOKEN" \
              "$FORGEJO_BASE_URL/api/v1/repos/$TAP_REPO/contents/$path?ref=main")
            cur_sha=$(jq -r '.sha' <<< "$meta")
            tmp=$(mktemp)
            jq -r '.content' <<< "$meta" | base64 -d > "$tmp"
            # awk so the URL's special chars don't need sed escaping.
            awk -v repl="$new_line" '/^  url "/ && !done { print repl; done=1; next } { print }' \
              "$tmp" > "$tmp.new"
            mv "$tmp.new" "$tmp"
            new_b64=$(base64 -w0 < "$tmp")
            payload=$(jq -n --arg msg "chore(formula): bump $fname to ${TAG} [skip ci]" \
              --arg c "$new_b64" --arg sha "$cur_sha" --arg branch main \
              '{message:$msg, content:$c, sha:$sha, branch:$branch}')
            code=$(curl -sS -o /tmp/tapresp.json -w '%{http_code}' -X PUT \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              "$FORGEJO_BASE_URL/api/v1/repos/$TAP_REPO/contents/$path")
            if [ "$code" != "200" ] && [ "$code" != "201" ]; then
              echo "::error::forgejo tap formula bump failed for $fname: HTTP $code"
              cat /tmp/tapresp.json
              exit 1
            fi
          done
