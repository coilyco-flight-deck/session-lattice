# Globally skip coily-generated lockdown-deny.sh - its comments are
# regenerated by `coily lockdown --apply --replace` and live upstream.
exclude: ^\.claude/lockdown-deny\.sh$

repos:

  - repo: local
    hooks:
      - id: emit-dts
        name: emit session-lattice.d.ts
        description: Regenerate session-lattice.d.ts from the FastAPI reads app's OpenAPI schema. Fails the commit if the spec drifted so you can re-stage the updated file.
        entry: uv run scripts/emit_dts.py
        language: system
        files: ^(session_lattice/service\.py|scripts/emit_dts\.py|session-lattice\.d\.ts)$
        pass_filenames: false

  # BEGIN managed by agentic-os/scripts/apply-agentic-os-hooks.py
  - repo: https://github.com/coilysiren/agentic-os
    rev: v0.2.8
    hooks:
      - id: catalog-doc-size
      - id: catalog-trifecta
      - id: documentation-layout
      - id: code-comments
      - id: catalog-block-present
      - id: validate-skills
      - id: dead-cross-links
      - id: closes-issue
      - id: conventional-commit
  # END managed by agentic-os/scripts/apply-agentic-os-hooks.py
